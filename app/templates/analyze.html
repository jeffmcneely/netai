{% extends 'base.html' %}

{% block nav_panel_extras %}
<div class="nav-section nav-actions" id="analyzeActionSection">
  <button id="analyzeBtn" type="button">analyze</button>
  <button id="searchBtn" type="button">find flow</button>
  <button id="explorerBtn" type="button">explorer</button>
  <button id="findObjectBtn" type="button">find object</button>
</div>

<div class="nav-section nav-config" id="analyzeConfigSection">
  <h3 id="analyzeConfigHeading">Config Folder</h3>
  <div id="analyzeFolderList" class="folder-list"></div>
  <label id="analyzeFolderChoiceNewLabel" class="radio-row">
    <input type="radio" name="analyzeFolderChoice" value="__new__" id="analyzeFolderChoiceNew">
    <span id="analyzeFolderChoiceNewText">new</span>
  </label>
  <input id="analyzeNewFolderName" type="text" placeholder="new-folder-name" class="text-input hidden">
</div>
{% endblock %}

{% block content %}
<section id="analyzePage" class="page">
  <h2 id="analyzePageHeading">Analyze</h2>

  <div id="searchPanel" class="card hidden">
    <h3 id="searchPanelHeading">Search Filters</h3>
    <div id="searchFilterGrid" class="grid-2">
      <label id="srcIpsLabel">srcIps<input id="srcIps" type="text" placeholder="10.0.0.0/8,192.168.1.1"></label>
      <label id="dstIpsLabel">dstIps<input id="dstIps" type="text" placeholder="8.8.8.8"></label>
      <label id="srcPortsLabel">srcPorts<input id="srcPorts" type="text" placeholder="22,53-99"></label>
      <label id="dstPortsLabel">dstPorts<input id="dstPorts" type="text" placeholder="22,53-99"></label>
      <label id="applicationsLabel">applications<input id="applications" type="text" placeholder="SSH, DNS, SNMP"></label>
      <label id="ipProtocolsLabel">ipProtocols<input id="ipProtocols" type="text" placeholder="TCP, UDP, ICMP"></label>
    </div>

    <details id="advancedPacketFields">
      <summary id="advancedPacketFieldsSummary">Advanced Packet Fields</summary>
      <div id="advancedFilterGrid" class="grid-2 top-gap">
        <label id="icmpCodesLabel">icmpCodes<input id="icmpCodes" type="text" placeholder="0,3"></label>
        <label id="icmpTypesLabel">icmpTypes<input id="icmpTypes" type="text" placeholder="8,11"></label>
        <label id="dscpsLabel">dscps<input id="dscps" type="text" placeholder="0,16"></label>
        <label id="ecnsLabel">ecns<input id="ecns" type="text" placeholder="0,1"></label>
        <label id="packetLengthsLabel">packetLengths<input id="packetLengths" type="text" placeholder="64,1500"></label>
        <label id="fragmentOffsetsLabel">fragmentOffsets<input id="fragmentOffsets" type="text" placeholder="0,128"></label>
      </div>
      <fieldset id="tcpFlagsFieldset" class="tcp-flags">
        <legend id="tcpFlagsLegend">tcpFlags</legend>
        <label id="tcpFlagAckLabel"><input type="checkbox" value="ack" class="tcp-flag">ack</label>
        <label id="tcpFlagEstLabel"><input type="checkbox" value="est" class="tcp-flag">est</label>
        <label id="tcpFlagRstLabel"><input type="checkbox" value="rst" class="tcp-flag">rst</label>
        <label id="tcpFlagSynLabel"><input type="checkbox" value="syn" class="tcp-flag">syn</label>
        <label id="tcpFlagSynAckLabel"><input type="checkbox" value="synack" class="tcp-flag">synack</label>
      </fieldset>
    </details>

    <details id="resultMatchFields" class="top-gap">
      <summary id="resultMatchFieldsSummary">Additional Match Fields (client-side)</summary>
      <div id="resultMatchGrid" class="grid-2 top-gap">
        <label id="matchActionLabel">Action<input id="matchAction" type="text" placeholder="PERMIT"></label>
        <label id="matchNodeLabel">Node<input id="matchNode" type="text" placeholder="as3border2"></label>
        <label id="matchFilterNameLabel">Filter Name<input id="matchFilterName" type="text" placeholder="101"></label>
        <label id="matchLineContentLabel">Line Content<input id="matchLineContent" type="text" placeholder="permit ip host"></label>
        <label id="matchIngressNodeLabel">Flow ingressNode<input id="matchIngressNode" type="text" placeholder="as3border2"></label>
        <label id="matchIngressInterfaceLabel">Flow ingressInterface<input id="matchIngressInterface" type="text" placeholder="outside"></label>
        <label id="matchIngressVrfLabel">Flow ingressVrf<input id="matchIngressVrf" type="text" placeholder="default"></label>
      </div>
    </details>

    <div id="searchActions" class="actions top-gap">
      <button id="runSearchBtn" type="button">run search</button>
      <button id="applyClientMatchBtn" type="button">apply match filters</button>
    </div>
  </div>

  <div id="findObjectPanel" class="card hidden">
    <h3 id="findObjectPanelHeading">Find Object</h3>
    <label id="findObjectIpLabel">IP
      <input id="findObjectIp" type="text" placeholder="192.168.1.1 / fe80::3 / 172.16.40.3/24">
    </label>
    <div id="findObjectActions" class="actions top-gap">
      <button id="runFindObjectBtn" type="button">run find object</button>
    </div>
  </div>

  <div id="analysisMeta" class="card hidden"></div>
  <div id="analyzeWorkspace" class="analyze-workspace">
    <div id="resultColumn" class="result-column">
      <div id="results" class="card hidden"></div>
      <div id="pager" class="actions hidden"></div>
      <div id="findObjectResults" class="card hidden"></div>
      <div id="findObjectPager" class="actions hidden"></div>
    </div>
    <aside id="detailFlyout" class="card detail-flyout hidden">
      <div class="detail-flyout-header">
        <h3 id="detailFlyoutTitle">Details</h3>
        <div class="flyout-controls" role="group" aria-label="Detail panel controls">
          <button id="detailFlyoutMaximize" class="flyout-control flyout-control-maximize" type="button" aria-label="Maximize" title="Maximize">
            <span class="flyout-icon" aria-hidden="true"></span>
          </button>
          <button id="detailFlyoutMinimize" class="flyout-control flyout-control-minimize" type="button" aria-label="Minimize" title="Minimize">
            <span class="flyout-icon" aria-hidden="true"></span>
          </button>
          <button id="detailFlyoutClose" class="flyout-control flyout-control-close" type="button" aria-label="Close" title="Close">
            <span class="flyout-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <div id="detailFlyoutBody" class="detail-flyout-body"></div>
    </aside>
    <aside id="fileViewerFlyout" class="card detail-flyout hidden">
      <div class="detail-flyout-header">
        <h3 id="fileViewerFlyoutTitle">File Viewer</h3>
        <div class="flyout-controls" role="group" aria-label="File viewer controls">
          <button id="fileViewerFlyoutMaximize" class="flyout-control flyout-control-maximize" type="button" aria-label="Maximize" title="Maximize">
            <span class="flyout-icon" aria-hidden="true"></span>
          </button>
          <button id="fileViewerFlyoutMinimize" class="flyout-control flyout-control-minimize" type="button" aria-label="Minimize" title="Minimize">
            <span class="flyout-icon" aria-hidden="true"></span>
          </button>
          <button id="fileViewerFlyoutClose" class="flyout-control flyout-control-close" type="button" aria-label="Close" title="Close">
            <span class="flyout-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
      <div id="fileViewerFlyoutBody" class="detail-flyout-body"></div>
    </aside>
  </div>
</section>
{% endblock %}
